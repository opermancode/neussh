name: 🚀 Build & Release NeuSSH (macOS + Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.2.0)'
        required: true
        default: '0.2.0'

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # BUILD FOR WINDOWS
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🏷️ Extract version from tag
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: 📝 Update package.json version
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          # Update package.json version using Node.js
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated package.json version to:', pkg.version);
          "
          cat package.json | grep '"version"'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build renderer
        run: npm run build:renderer

      - name: 📦 Build Windows installer
        run: npm run build:win

      - name: 📤 Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/NeuSSH-Setup-*.exe
            dist/NeuSSH-Portable-*.exe
          if-no-files-found: error
          retention-days: 5

  # ============================================================
  # BUILD FOR MACOS (Intel + Apple Silicon)
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🏷️ Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: 📝 Update package.json version
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Updated package.json version to:', pkg.version);
          "
          cat package.json | grep '"version"'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build renderer
        run: npm run build:renderer

      - name: 📦 Build macOS ZIP
        run: npm run build:mac

      - name: 📤 Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/NeuSSH-*.zip
          if-no-files-found: error
          retention-days: 5

  # ============================================================
  # CREATE GITHUB RELEASE
  # ============================================================
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🏷️ Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 📋 Verify artifacts
        run: |
          echo "=== All Artifacts ==="
          ls -la artifacts/
          echo ""
          echo "=== File sizes ==="
          du -sh artifacts/*

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "🔐 NeuSSH v${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 🔐 NeuSSH v${{ steps.get_version.outputs.VERSION }}

            **Modern SSH Connection Manager — Better than PuTTY**

            ### 📦 Downloads

            | Platform | Installer | Portable | Architecture |
            |----------|-----------|----------|--------------|
            | **Windows** | `NeuSSH-Setup-${{ steps.get_version.outputs.VERSION }}.exe` | `NeuSSH-Portable-${{ steps.get_version.outputs.VERSION }}.exe` | x64, x86 |
            | **macOS** | `NeuSSH-${{ steps.get_version.outputs.VERSION }}-mac.zip` | `NeuSSH-${{ steps.get_version.outputs.VERSION }}-arm64-mac.zip` | Intel + Apple Silicon |

            ### ✨ Features
            - 🖥️ Modern xterm.js terminal with 256 colors
            - 🔑 Universal key support (.pem, .ppk, .key, .ed25519)
            - 💾 Encrypted profile storage with import/export
            - ⚡ One-click server connections
            - 🔍 Real-time server search
            - 🌙 Beautiful dark UI

            ### 🔧 Installation

            **Windows:**
            - Download `NeuSSH-Setup-${{ steps.get_version.outputs.VERSION }}.exe` and run the installer
            - Or use `NeuSSH-Portable-${{ steps.get_version.outputs.VERSION }}.exe` for no installation

            **macOS:**
            - Download `NeuSSH-${{ steps.get_version.outputs.VERSION }}-mac.zip` (Intel) or `NeuSSH-${{ steps.get_version.outputs.VERSION }}-arm64-mac.zip` (Apple Silicon)
            - Extract and drag NeuSSH to Applications
            - On first launch, right-click → Open (Gatekeeper)

            ### 🔒 Security
            - AES-256 encrypted local storage
            - No telemetry or data collection
            - Keys never leave your machine

            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.get_version.outputs.VERSION }}...main
          files: |
            artifacts/NeuSSH-Setup-*.exe
            artifacts/NeuSSH-Portable-*.exe
            artifacts/NeuSSH-*.zip
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: ✅ Release Complete
        run: |
          echo "🎉 NeuSSH v${{ steps.get_version.outputs.VERSION }} released successfully!"
          echo ""
          echo "📥 Download links:"
          echo "  https://github.com/${{ github.repository }}/releases/tag/v${{ steps.get_version.outputs.VERSION }}"
