name: 🔍 PR Validation

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'renderer/**'
      - 'package.json'
      - 'package-lock.json'

env:
  NODE_VERSION: '20'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint code
        run: npm run lint
        continue-on-error: true

      - name: 🧪 Run tests
        run: npm run test
        continue-on-error: true

      - name: 🏗️ Build renderer (check compilation)
        run: npm run build:renderer

      - name: ✅ PR Check Complete
        run: echo "All checks passed!"
